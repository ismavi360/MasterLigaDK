<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASTER LIGA DK - Sistema de Gestión Firebase</title>
    <style>
        :root {
            --bg-principal: #0d0e12;
            --bg-tarjeta: #161820;
            --bg-entrada: #1f222e;
            --oro: #d4af37;
            --oro-brillo: #f3e5ab;
            --texto-claro: #f5f6fa;
            --texto-mutado: #8a8f9e;
            --estado-normal: #1f222e;
            --estado-campeon: #1b4d3e;
            --estado-penalizado: #661d1d;
            --estado-ambos: #594a13;
            --texto-campeon: #52c41a;
            --texto-penalizado: #ff4d4f;
            --texto-ambos: #ffc53d;
            --borde-radio: 8px;
            --transicion: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: pan-x pan-y; }

        body { background-color: var(--bg-principal); color: var(--texto-claro); padding: 15px; line-height: 1.6; overflow-x: hidden; }

        .contenedor { max-width: 1200px; margin: 0 auto; width: 100%; }

        header { text-align: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 2px solid var(--oro); display: flex; flex-direction: column; align-items: center; gap: 8px; }

        header h1 { font-size: 2.5rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 900; background: linear-gradient(to right, #ff0055, #ffd700, #00ffcc, #0099ff, #ff00ff, #ff0055); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: brilloTextoGradiente 3s linear infinite; }

        .tarjeta { background-color: var(--bg-tarjeta); border: 1px solid #2a2e3d; border-radius: var(--borde-radio); padding: 20px; margin-bottom: 20px; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        .tabla-contenedor { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: var(--borde-radio); border: 1px solid #2a2e3d; -webkit-overflow-scrolling: touch; }

        table { width: 100%; min-width: 500px; border-collapse: collapse; text-align: left; font-size: 0.95rem; }

        th { background-color: #1a1d29; color: var(--oro); padding: 14px; text-transform: uppercase; font-size: 0.85rem; border-bottom: 2px solid #2a2e3d; white-space: nowrap; }

        td { padding: 12px 14px; border-bottom: 1px solid #2a2e3d; vertical-align: middle; }

        /* Ajustes específicos para evitar desbordamiento */
        #tabla-jornada-diaria, #tabla-master-champion { width: 100%; min-width: 0; }

        .btn { padding: 12px 20px; border-radius: var(--borde-radio); font-weight: 600; cursor: pointer; border: none; text-transform: uppercase; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }

        .btn-oro { background-color: var(--oro); color: #000; }
        .btn-peligro { background-color: #441515; color: #ff8888; border: 1px solid #661d1d; }
        .btn-accion { background-color: var(--bg-entrada); color: var(--texto-claro); border: 1px solid #3a3f52; }
        .btn-purpura { background-color: #4c1d95; color: #ddd6fe; border: 1px solid #7c3aed; }
        .btn-azul { background-color: #1a365d; color: #93c5fd; border: 1px solid #2563eb; }
        .btn-verde { background-color: #14532d; color: #4ade80; border: 1px solid #16a34a; }

        .grupo-control { display: flex; flex-direction: column; gap: 5px; position: relative; width: 100%; }
        input[type="text"], input[type="number"], select { background-color: var(--bg-entrada); border: 1px solid #3a3f52; color: var(--texto-claro); padding: 12px; border-radius: var(--borde-radio); width: 100%; }

        .lista-sugerencias { position: absolute; top: 100%; left: 0; width: 100%; background-color: var(--bg-tarjeta); border: 1px solid var(--oro); z-index: 10; max-height: 150px; overflow-y: auto; display: none; }
        .sugerencia-item { padding: 10px; cursor: pointer; }
        .sugerencia-item:hover { background-color: var(--bg-entrada); color: var(--oro); }

        @keyframes brilloTextoGradiente { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        
        body.modo-espectador #sec-configuracion,
        body.modo-espectador #sec-maestro-duelistas,
        body.modo-espectador #barra-pestañas,
        body.modo-espectador #sec-formulario-registro,
        body.modo-espectador #sec-configuracion-anual,
        body.modo-espectador .btn-tab-fecha { display: none !important; }
    </style>
</head>
<body class="modo-espectador">

<div class="contenedor">
    <header>
        <h1>Master Liga DK</h1>
        <button class="btn btn-accion" id="btn-modo-auth">🔑 Acceso Admin</button>
    </header>

    <div id="zona-operativa" style="display: none;">
        <section class="tarjeta" id="sec-tabla-jornada-contenedor">
            <div class="tarjeta-titulo"><span id="titulo-tabla-jornada">Resultados de la Jornada</span></div>
            <div class="tabla-contenedor">
                <table id="tabla-jornada-diaria">
                    <thead>
                        <tr><th>Duelista</th><th>Match</th><th>Puntos</th><th>Acciones</th></tr>
                    </thead>
                    <tbody id="cuerpo-tabla-jornada"></tbody>
                </table>
            </div>
        </section>

        <section class="tarjeta" id="sec-configuracion-anual">
            <div class="tarjeta-titulo"><span>REGISTRO DE CAMPEONES MENSUALES</span></div>
            <form id="form-registro-mensual" onsubmit="event.preventDefault();">
                <div class="grupo-control">
                    <label for="txt-nombre-campeon-mes">Duelista Campeón</label>
                    <input type="text" id="txt-nombre-campeon-mes" placeholder="Buscar en base de datos..." autocomplete="off">
                    <div class="lista-sugerencias" id="sugerencias-mensual"></div>
                </div>
                <button type="button" class="btn btn-purpura" id="btn-guardar-mes" style="margin-top:10px;">Asignar Campeón</button>
            </form>
        </section>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { /* ... tu config ... */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const documentoLigaRef = doc(db, "master_liga_dk_data", "semana_actual");

    let appEstado = { maestroDuelistas: [], campeonesMensuales: {} };
    const txtNombreCampeonMes = document.getElementById('txt-nombre-campeon-mes');
    const sugerenciasMensual = document.getElementById('sugerencias-mensual');

    // Lógica para autocompletado en registro mensual
    txtNombreCampeonMes.addEventListener('input', () => {
        const inputVal = txtNombreCampeonMes.value.toLowerCase().trim();
        sugerenciasMensual.innerHTML = "";
        if (!inputVal) { sugerenciasMensual.style.display = "none"; return; }

        const filtrados = (appEstado.maestroDuelistas || []).filter(nom => nom.toLowerCase().includes(inputVal));
        if (filtrados.length > 0) {
            filtrados.forEach(match => {
                const d = document.createElement('div');
                d.className = "sugerencia-item";
                d.textContent = match;
                d.addEventListener('click', () => {
                    txtNombreCampeonMes.value = match;
                    sugerenciasMensual.style.display = "none";
                });
                sugerenciasMensual.appendChild(d);
            });
            sugerenciasMensual.style.display = "block";
        } else { sugerenciasMensual.style.display = "none"; }
    });
</script>
</body>
</html>
